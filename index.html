<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive Digitizer Pro</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script type="importmap">
      {
        "imports": {
          "@google/genai": "https://esm.run/@google/genai"
        }
      }
    </script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #1a73e8; margin-bottom: 20px; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 20px; }
        button:disabled { background: #ccc; }
        #status { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; font-size: 14px; }
        .info { display: block !important; background: #e8f0fe; color: #1967d2; }
        .error { display: block !important; background: #fce8e6; color: #c5221f; }
    </style>
</head>
<body>

<div class="box">
    <h2>Transcripteur d'Archives</h2>
    <label>1. Gemini API Key</label>
    <input type="password" id="apiKey" placeholder="Paste key here...">

    <label>2. Select Images</label>
    <input type="file" id="imageInput" accept="image/*" multiple>

    <button id="btn">Capture Data & Export Excel</button>
    <div id="status"></div>
</div>

<script type="module">
    import { GoogleGenAI } from "@google/genai";

    const btn = document.getElementById('btn');
    const status = document.getElementById('status');

    btn.addEventListener('click', async () => {
        const key = document.getElementById('apiKey').value;
        const files = document.getElementById('imageInput').files;

        if (!key || files.length === 0) {
            status.innerText = "Error: Key and Image required.";
            status.className = "error";
            return;
        }

        status.innerText = "Processing... the AI is reading the archive.";
        status.className = "info";
        btn.disabled = true;

        try {
            // FIX: Initializing with the key correctly for browser usage
            const genAI = new GoogleGenAI(key);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

            let finalData = [];

            for (const file of files) {
                const blob = await fileToBtn(file);
                const base64Data = blob.split(',')[1];

                const prompt = `Extract handwriting from this French record. 
                Focus on Column 3 (Nom), 4 (Prénoms), 5 (Age), 6 (Lieu), 11 (Situation).
                If you see ditto marks (") or 'do', repeat the name from the row above.
                Format as a JSON array of objects. Use Filename: ${file.name}`;

                const result = await model.generateContent([
                    prompt,
                    { inlineData: { data: base64Data, mimeType: file.type } }
                ]);

                const textOutput = result.response.text();
                const jsonOnly = textOutput.replace(/```json|```/g, "").trim();
                finalData = finalData.concat(JSON.parse(jsonOnly));
            }

            const ws = XLSX.utils.json_to_sheet(finalData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data");
            XLSX.writeFile(wb, "Archive_Capture.xlsx");

            status.innerText = "Success! Excel downloaded.";
        } catch (e) {
            status.innerText = "Error: " + e.message;
            status.className = "error";
        } finally {
            btn.disabled = false;
        }
    });

    function fileToBtn(file) {
        return new Promise((res) => {
            const r = new FileReader();
            r.onload = () => res(r.result);
            r.readAsDataURL(file);
        });
    }
</script>
</body>
</html>
